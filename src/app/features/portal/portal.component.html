<div class="layout">

  <section>
    <h3 class="step-label">
      <span class="step-num">1</span>
      Domain
    </h3>
    <app-badge-bar />
  </section>

  <section>
    <h3 class="step-label">
      <span class="step-num">2</span>
      Action
    </h3>
    <app-action-bar />
  </section>

  <section>
    <h3 class="step-label">
      <span class="step-num">3</span>
      Refinement
    </h3>
    <app-refine-input />
  </section>

  <section>
    <h3 class="step-label">
      <span class="step-num">4</span>
      Command
    </h3>
    <app-command-preview />
  </section>

  <section>
    <h3 class="step-label">
      <span class="step-num">5</span>
      Result
    </h3>
    <app-result-table
      [data]="portalState.result()"
      [loading]="portalState.running()"
      [error]="portalState.error()" />
  </section>

</div>
