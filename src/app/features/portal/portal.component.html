<div class="shell">

  <aside class="sidebar">
    <header class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">NeLS</span>
      <span class="brand-tag">explorer</span>
    </header>

    <nav class="nav">
      <div class="nav-group">
        <h4 class="nav-title">Domains</h4>
        <app-badge-bar />
      </div>
    </nav>
  </aside>

  <main class="workspace">

    @if (portalState.badge()) {
      <section class="actions-pane">
        <h4 class="pane-title">
          <span>Actions</span>
          <span class="pane-sep"></span>
        </h4>
        <app-action-bar />
      </section>
    }

    <app-command-preview />

    <div class="result-pane">
      <app-result-table
        [data]="portalState.result()"
        [loading]="portalState.running()"
        [error]="portalState.error()" />
    </div>
  </main>

</div>
